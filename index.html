<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js sakkadat | Fru Huszár</title>
    <link rel="stylesheet" href="./css/style.css?v=4" />
    <script type="module" src="./js/index.js?v=4"></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Híres sakkozók</h1>
      </header>
      <article>
        <table border="1">
          <thead>
            <tr>
              <th class="unsorted" id="nev">Név ↓</th>
              <th class="unsorted" id="nemzetiseg">Nemzetiség ↓</th>
              <th class="unsorted" id="gyozelmek_szama">Győzelmek száma ↓</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </article>
      <section class="pozicio-section">
        <h2>Sakktábla pozíciók</h2>
        <div class="melle">
          <div>
            <div class="input">
              <label for="pozicio1">1. pozíció:</label>
              <input
                type="text"
                id="pozicio1"
                name="pozicio1"
                placeholder="pl. e4"
              />
            </div>
            <div class="input">
              <label for="pozicio2">2. pozíció:</label>
              <input
                type="text"
                id="pozicio2"
                name="pozicio2"
                placeholder="pl. d5"
              />
            </div>
          </div>  
          <button id="sakk">Sakk</button>
        </div> 
        <p class="ide">Sakk eredménye:</p>
      </section>
      <footer>
        <p>&copy; Huszár Fruzsina Anna</p>
      </footer>
    </main>
  </body>
</html>
